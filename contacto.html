<div class="panel" style="gap: 18px;">
  <div class="card">
    <div class="section-title">Contacto</div>
    <h1 style="margin-top: 10px; font-size: 2rem; line-height: 1.2; color: #01213e;">
      ¿Tienes un proyecto en mente?
    </h1>
    <p style="margin-top: 14px; font-size: 1rem; line-height: 1.7;">
      Escríbenos para solicitar información, pedir un presupuesto o simplemente saludarnos. Te responderemos lo antes posible.
    </p>

    <form style="margin-top: 24px; display: flex; flex-direction: column; gap: 14px; max-width: 600px;">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
        <input class="auth-input" type="text" placeholder="Nombre completo">
        <input class="auth-input" type="email" placeholder="Email de contacto">
      </div>
      <textarea class="auth-input" placeholder="Cuéntanos sobre tu proyecto..." rows="6" style="resize: vertical;"></textarea>
      
      <div>
        <button type="button" class="btn btn-cta">Enviar mensaje</button>
      </div>
    </form>
  </div>

  <div class="card">
    <div class="section-title">Otras formas de contacto</div>
    <div style="margin-top: 12px; display: flex; gap: 24px;">
      <div>
        <div class="k">Email</div>
        <div class="v">hola@superspot.com</div>
      </div>
      <div>
        <div class="k">Ubicación</div>
        <div class="v">Valencia, España</div>
      </div>
    </div>
  </div>
</div>
