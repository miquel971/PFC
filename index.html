<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>superSpot</title>

  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
</head>

<body>

  <!-- LANDING -->
  <section id="inicio" class="landing">
    <video class="landing-video" autoplay muted loop playsinline>
      <source src="video/home_02_web.mp4" type="video/mp4">
    </video>

    <div class="landing-overlay"></div>

    <div class="landing-centro animacion-entrada">
      <div class="landing-logo">
        <img src="img/logo.png" alt="SuperSpot">
      </div>

      <div class="landing-actions">
        <button class="btn btn-cta" data-zona="bal">Baleares</button>
        <button class="btn btn-cta" data-zona="med">Mediterráneo</button>
        <button class="btn btn-cta" data-zona="cant">Cantábrico</button>
        <button class="btn btn-cta" data-zona="pv">País Vasco</button>
        <button class="btn btn-cta" data-zona="gal">Galicia</button>
      </div>
    </div>
  </section>

  <!-- APLICACIÓN -->
  <div id="aplicacion" class="app hidden">
    <header class="topbar">
      <div class="brand">
        <strong>superSpot</strong>
      </div>

      <div class="controls">
        <select id="selectorZona" class="select">
          <option value="med">Mediterráneo</option>
          <option value="bal">Baleares</option>
          <option value="cant">Cantábrico</option>
          <option value="pv">País Vasco</option>
          <option value="gal">Galicia</option>
        </select>

        <button id="botonCargarSpots" class="btn">Cargar spots</button>
        <button id="botonVolverInicio" class="btn btn-secondary">Inicio</button>
      </div>

      <nav>
        <button id="btnAbrirLogin" class="nav-btn" type="button">Login</button>
        <button id="btnAbrirRegistro" class="nav-btn" type="button">Registro</button>
      </nav>
    </header>

    <main class="main">
      <div class="layout">
        <div id="mapa" class="mapa-pequeno"></div>

        <aside class="panel">
          <div class="card">
            <div id="recoBox"></div>
          </div>

          <div class="card" id="cardFotoDia">
            <div class="section-title">Foto del día</div><br>
            <img src="img/foto-dia.jpg" alt="Foto del día" style="width:100%; border-radius:0px; display:block;">
          </div>

          <!-- PANEL DEL SPOT INTEGRADO -->
          <section id="spotPanel" class="spot-panel hidden">
            <div class="spot-panel-head">
              <div>
                <div id="tituloSpot" class="modal-title"></div>
                <div id="subtituloSpot" class="modal-subtitle"></div>
              </div>

              <div class="ficha-acciones">
                <button id="botonCentrarMapa" class="btn btn-secondary">Centrar</button>
                <button id="botonCerrarSpot" class="btn">Cerrar</button>
              </div>
            </div>

            <div class="spot-panel-body">
              <section class="ficha-arriba">
                <div class="ficha-resumen" id="badgesSpot"></div>

                <div class="ficha-datos">
                  <div class="dato">
                    <div class="k">Ola</div>
                    <div class="v" id="ahoraOla">— m</div>
                  </div>

                  <div class="dato">
                    <div class="k">Dir. ola</div>
                    <div class="v" id="ahoraDirOla">—</div>
                  </div>

                  <div class="dato">
                    <div class="k">Periodo</div>
                    <div class="v" id="ahoraPeriodo">— s</div>
                  </div>

                  <div class="dato">
                    <div class="k">Viento</div>
                    <div class="v" id="ahoraViento">— km/h</div>
                  </div>

                  <div class="dato">
                    <div class="k">Dir. viento</div>
                    <div class="v" id="ahoraDirViento">—</div>
                  </div>

                  <div class="dato">
                    <div class="k">Estado</div>
                    <div class="v" id="ahoraEstadoViento">—</div>
                  </div>
                </div>

                <div class="ficha-info-mini">
                  <span><b>Boya:</b> <span id="spotBoya">—</span></span>
                  <span><b>Webcam:</b> <span id="spotWebcam">—</span></span>
                  <span><b>Coords:</b> <span id="spotCoordenadas">—</span></span>
                </div>
              </section>

              <section class="ficha-abajo">
                <div class="mapas-titulo">
                  <div class="section-title">Predicción (mapas)</div>

                  <div class="mapas-botones">
                    <button id="botonMapaOlas" class="btn btn-secondary">Olas</button>
                    <button id="botonMapaViento" class="btn btn-secondary">Viento</button>
                  </div>
                </div>

                <div class="mapas-grid">
                  <div class="mapa-box">
                    <div class="k">Olas</div>
                    <iframe id="iframeOlas" class="mapa-iframe" loading="lazy"></iframe>
                  </div>

                  <div class="mapa-box">
                    <div class="k">Viento</div>
                    <iframe id="iframeViento" class="mapa-iframe" loading="lazy"></iframe>
                  </div>
                </div>
              </section>
            </div>
          </section>
        </aside>
      </div>

      <div class="status" id="estado">
        Selecciona zona y pulsa “Cargar spots”.
      </div>
    </main>
  </div>

  <!-- MODAL LOGIN -->
  <div id="modalLogin" class="modal hidden" aria-hidden="true">
    <div class="modal-box modal-box-auth">
      <button id="btnCerrarLogin" class="modal-close" type="button">✕</button>

      <div class="modal-head">
        <div class="modal-title">Iniciar sesión</div>
        <div class="modal-subtitle">Usuario y contraseña</div>
      </div>

      <form id="formLogin" class="modal-body auth-form" novalidate>

        <label class="visually-hidden" for="loginUsuario">Usuario</label>
        <input
          id="loginUsuario"
          class="auth-input"
          type="text"
          name="usuario"
          placeholder="Usuario"
          required
          minlength="2"
          maxlength="40"
          autocomplete="username"
        >

        <label class="visually-hidden" for="loginPass">Contraseña</label>
        <input
          id="loginPass"
          class="auth-input"
          type="password"
          name="password"
          placeholder="Contraseña"
          required
          minlength="8"
          maxlength="72"
          autocomplete="current-password"
        >

        <div id="msgLogin" class="auth-msg" role="status" aria-live="polite"></div>

        <div class="modal-footer">
          <button id="btnCancelarLogin" class="btn btn-secondary" type="button">Cancelar</button>
          <button class="btn" type="submit">Entrar</button>
        </div>
      </form>

      <div class="auth-logo-bottom">
        <img src="img/logo.png" alt="SuperSpot">
      </div>
    </div>
  </div>

  <!-- MODAL REGISTRO -->
  <div id="modalRegistro" class="modal hidden" aria-hidden="true">
    <div class="modal-box modal-box-auth">
      <button id="btnCerrarRegistro" class="modal-close" type="button">✕</button>

      <div class="modal-head">
        <div class="modal-title">Crear cuenta</div>
        <div class="modal-subtitle">Nombre, email y contraseña</div>
      </div>

      <form id="formRegistro" class="modal-body auth-form" novalidate>
        <label class="visually-hidden" for="regNombre">Nombre</label>
        <input
          id="regNombre"
          class="auth-input"
          type="text"
          name="nombre"
          placeholder="Nombre"
          required
          minlength="2"
          maxlength="40"
          autocomplete="name"
        >

        <label class="visually-hidden" for="regEmail">Email</label>
        <input
          id="regEmail"
          class="auth-input"
          type="email"
          name="email"
          placeholder="email: ejemplo@gmail.com"
          required
          maxlength="120"
          autocomplete="email"
        >

        <label class="visually-hidden" for="regZona">Zona favorita</label>
        <select id="regZona" class="auth-input" name="zona_favorita" required>
          <option value="" disabled selected>Selecciona tu zona favorita</option>
          <option value="med">Mediterráneo</option>
          <option value="bal">Baleares</option>
          <option value="cant">Cantábrico</option>
          <option value="pv">País Vasco</option>
          <option value="gal">Galicia</option>
        </select>

        <label class="visually-hidden" for="regPass">Contraseña</label>
        <input
          id="regPass"
          class="auth-input"
          type="password"
          name="password"
          placeholder="Contraseña"
          required
          minlength="8"
          maxlength="72"
          autocomplete="new-password"
        >

        <label class="visually-hidden" for="regPass2">Confirmar contraseña</label>
        <input
          id="regPass2"
          class="auth-input"
          type="password"
          name="confirm_password"
          placeholder="Confirmar contraseña"
          required
          minlength="8"
          maxlength="72"
          autocomplete="new-password"
        >

        <div id="msgRegistro" class="auth-msg" role="status" aria-live="polite"></div>

        <div class="modal-footer">
          <button id="btnCancelarRegistro" class="btn btn-secondary" type="button">Cancelar</button>
          <button id="btnCheckRegistro" class="btn" type="submit">Registrarme</button>
        </div>
      </form>

      <div class="auth-logo-bottom">
        <img src="img/logo.png" alt="SuperSpot">
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="script.js"></script>
</body>
</html>
